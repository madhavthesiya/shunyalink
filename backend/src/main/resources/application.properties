spring.application.name=url-shortener
spring.datasource.url=jdbc:postgresql://localhost:5432/urlshortener
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Base URL (change this in production deployment )
app.base-url=http://localhost:8080

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.data.redis.host=localhost
spring.data.redis.port=6379

logging.level.com.shunyalink=INFO
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false

app.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# JWT Configuration — JWT_SECRET must be set via environment variable in production
app.jwt.secret=${JWT_SECRET:my-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
app.jwt.expiration-ms=86400000

# Google OAuth
app.google.client-id=${GOOGLE_CLIENT_ID:520225938600-lci1t3a5eb08udd6qgup6qcqa6vv7cbr.apps.googleusercontent.com}

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply.shunyalink@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

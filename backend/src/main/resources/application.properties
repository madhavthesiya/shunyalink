spring.application.name=url-shortener
spring.datasource.url=jdbc:postgresql://localhost:5432/urlshortener
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Base URL (default for local development)
app.base-url=http://localhost:8080

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.data.redis.host=localhost
spring.data.redis.port=6379

# Database Connection Pool (High-Density Clustering)
# Set to 2 per node to ensure 3 replicas (6 total) fit within Azure's 10-connection limit
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

logging.level.com.shunyalink=INFO
spring.jpa.open-in-view=false

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.write-date-timestamps-as-nanoseconds=false

app.allowed-origin=${ALLOWED_ORIGIN:http://localhost:3000}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:my-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
app.jwt.expiration-ms=86400000
app.encryption.secret=${ENCRYPTION_SECRET:my-ultra-secret-key-32-chars-long}

# Google OAuth
app.google.client-id=${GOOGLE_CLIENT_ID:520225938600-lci1t3a5eb08udd6qgup6qcqa6vv7cbr.apps.googleusercontent.com}

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:noreply.shunyalink@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Flyway configuration
spring.flyway.repair-on-migrate=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# Actuator Monitoring
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Gemini AI Integration
app.gemini.api-key=${GEMINI_API_KEY}

# Groq AI Integration
app.groq.api-key=${GROQ_API_KEY}

# Multipart File Upload Limits (Profile Picture Uploads)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB



services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: urlshortener-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d urlshortener"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: urlshortener-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend (Replicated 🚀) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    # Removed container_name for replication
    restart: unless-stopped
    deploy:
      replicas: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scraper:
        condition: service_healthy
    environment:
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/urlshortener
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}
      MAIL_USERNAME: ${MAIL_USERNAME:-noreply.shunyalink@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      CLOUDINARY_URL: ${CLOUDINARY_URL}
      SCRAPER_URL: http://scraper:3001
    # No direct port exposure — only Nginx can talk to backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Puppeteer Scraper (Headless Chrome 🔍) ──────────────────────────────────
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile.scraper
    container_name: urlshortener-scraper
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Nginx Load Balancer (Entry Point ⚖️) ──────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.nginx
    container_name: urlshortener-lb
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${APP_BASE_URL:-http://localhost}
    container_name: urlshortener-frontend
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://nginx
    depends_on:
      - nginx
    ports:
      - "3000:3000"

volumes:
  postgres_data:
